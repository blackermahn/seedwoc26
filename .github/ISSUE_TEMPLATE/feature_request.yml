name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Great! We'd love to hear your ideas for improvements.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
      placeholder: |
        Add a new chapter on [topic]...
        Improve [existing content]...
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why is this needed?
      description: What problem does this solve or opportunity does it create?
      placeholder: This would help students...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Have you considered other approaches?
      placeholder: Another way to solve this...

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any relevant information
      placeholder: Links, examples, or related features...

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I checked for duplicate feature requests
          required: true
        - label: This aligns with SeedWOC's mission
          required: false

